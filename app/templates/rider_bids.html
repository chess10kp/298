<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rider — bids</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; max-width: 52rem; }
    .muted { color: #52525b; font-size: 0.9rem; }
    .err { color: #b91c1c; }
    .ride-card { border: 1px solid #e4e4e7; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    .bid-list { margin: 0.5rem 0; padding-left: 1.2rem; }
    .bid-list li { margin: 0.35rem 0; }
    button { cursor: pointer; margin-left: 0.5rem; }
    #rider-map { height: 360px; width: 100%; margin: 1rem 0; border-radius: 8px; border: 1px solid #e4e4e7; }
    .warn { color: #b45309; }
  </style>
</head>
<body>
  <h1>Bids on your rides</h1>
  <p class="muted">Open rides only. Accepting a bid assigns the driver and closes other bids.</p>
  {% if not maps_key %}
  <p class="warn">Set <code>GOOGLE_MAPS_API_KEY</code> to enable the map below. Bids still work without it.</p>
  {% endif %}
  <div id="rider-map"></div>
  <p><a href="/api/rider/dashboard">Rider dashboard</a> · <button type="button" id="btn-refresh">Refresh</button></p>
  <div id="bids-root"></div>
  <script src="/static/rider_bids.js"></script>
  {% if maps_key %}
  <script async defer src="https://maps.googleapis.com/maps/api/js?key={{ maps_key }}&callback=window.initRiderMap"></script>
  {% else %}
  <script>window.initRiderMap = function () { console.warn('No maps key'); };</script>
  {% endif %}
</body>
</html>
