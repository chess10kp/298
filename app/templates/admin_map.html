<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — fleet map</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0.75rem 1rem; }
    #admin-map { height: 480px; width: 100%; margin: 1rem 0; border-radius: 8px; }
    pre { background: #f4f4f5; padding: 0.75rem; overflow: auto; max-height: 200px; font-size: 12px; }
    .warn { color: #b45309; }
    .muted { color: #52525b; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Partner / fleet map</h1>
  <p class="muted">Shows last reported driver GPS from <code>driver_locations</code>. Polls every 10s.</p>
  {% if not maps_key %}
  <p class="warn">Set <code>GOOGLE_MAPS_API_KEY</code> to show the map. JSON data still loads below.</p>
  {% endif %}
  <p><a href="/api/admin/dashboard">Back to admin dashboard</a></p>
  <div id="admin-map"></div>
  <h2>Driver locations (raw)</h2>
  <pre id="fleet-out">Loading…</pre>
  <script src="/static/admin_map.js"></script>
  {% if maps_key %}
  <script async defer src="https://maps.googleapis.com/maps/api/js?key={{ maps_key }}&callback=window.initAdminMap"></script>
  {% else %}
  <script>window.initAdminMap = function () { console.warn('No maps key'); };</script>
  {% endif %}
</body>
</html>
